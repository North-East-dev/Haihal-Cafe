<!DOCTYPE html>
<html>
<head>
<title>Haihal Cafe</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header>
    <h1>Haihal Cafe</h1>
    <div class="divider"></div>
    <nav>
        <a href="index.html">Menu</a>
        <a href="about.html">About</a>
        <a href="#" onclick="showQR()">QR Menu</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Haihal Cafe</h1>
        <p>Where Luxury Meets Taste</p>
        <button onclick="document.getElementById('menu').scrollIntoView()">
            Explore Menu
        </button>
    </div>
</section>

<div class="menu-controls">

    <input type="text" id="search" placeholder="Search food...">

    <select id="filter">
        <option value="all">All</option>
        <option value="veg">Veg</option>
        <option value="non-veg">Non-Veg</option>
    </select>

</div>

<section id="menu" class="menu-section">

    <h2 class="menu-title">Our Menu</h2>

    <div id="menu-container" class="menu-container"></div>

</section>

<div id="qrModal" class="qr-modal" style="display:none;">
    <div class="qr-box">
        <h2>Scan to View Menu</h2>
        <div id="qrcode"></div>
        <button onclick="closeQR()">Close</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="js/qr.js"></script>
<script src="js/menu.js"></script>

<footer class="footer">

    <div class="footer-container">

        <div class="footer-section">
            <h3>Haihal Cafe</h3>
            <p>Luxury dining with fast food & traditional taste.</p>
        </div>

        <div class="footer-section">
            <h4>Contact</h4>
            <p>📞 +91 XXXXXXXX</p>
            <p>📍 Your Location</p>
        </div>

        <div class="footer-section">
            <h4>Hours</h4>
            <p>Mon - Sun</p>
            <p>10:00 AM - 10:00 PM</p>
        </div>

    </div>

    <div class="footer-bottom">
        © 2026 Haihal Cafe. All rights reserved.
    </div>

</footer>

</body>
</html>
